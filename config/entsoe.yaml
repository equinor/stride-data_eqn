# ENTSO-E Transparency Platform download configuration
# Each entry maps STRIDE geography IDs to ENTSO-E bidding zone codes.
# Multi-zone countries (e.g., Norway, Italy) list all zones to aggregate (sum).
#
# Scope: 2016–2024 for all countries. 2015 excluded due to data gaps in
# Romania, Lithuania, and Sweden. Ireland and UK excluded due to persistent
# ENTSO-E data quality issues (Ireland: frequent multi-day gaps; UK: data
# stops mid-2021 post-Brexit).

entsoe:
  countries:
    - stride_geography: Austria
      iso_alpha2: AT
      zones: [AT]
      years: [2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]

    - stride_geography: Belgium
      iso_alpha2: BE
      zones: [BE]
      years: [2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]

